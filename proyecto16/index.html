<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 2.5em;
    }

    .typing {
      border-right: 3px solid #fff;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 3s steps(15, end) forwards, blink 0.8s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 16ch } /* Número de caracteres de "Próximamente..." */
    }

    @keyframes blink {
      50% { border-color: transparent }
    }
    /* Botones */
.contacto {
  display: flex;
  gap: 10px;
}

.btn {
  text-decoration: none;
  padding: 10px 16px;           /* ⬆️ Más grandes */
  border-radius: 10px;
  font-weight: bold;
  font-size: 1.05rem;
  transition: 0.3s;
}
    .whatsapp {
  background: #25d366;
  color: white;
}
  </style>
</head>
<body>
  <div class="contacto">
<a href="https://wa.me/50254379457" target="_blank" class="btn whatsapp">💬 WhatsApp</a>
    </div>
</body>
</html>
