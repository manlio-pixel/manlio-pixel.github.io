<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 2.5em;
    }

    .typing {
      border-right: 3px solid #fff;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 3s steps(15, end) forwards, blink 0.8s infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 16ch } /* Número de caracteres de "Próximamente..." */
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    .typing {
  font-family: 'Segoe UI', sans-serif;
  font-size: 20px;
  text-align: center;
  margin-top: 50px;
  color: #444;
}

/* Botón */
.btn-whatsapp {
  display: inline-block;
  margin-top: 10px;
  padding: 12px 28px;
  font-size: 18px;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff6ec4, #7873f5);
  box-shadow: 0 5px 15px rgba(255, 110, 196, 0.4);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

/* Efecto hover */
.btn-whatsapp:hover {
  transform: scale(1.08);
  box-shadow: 0 8px 25px rgba(120, 115, 245, 0.6);
}

/* Brillo animado */
.btn-whatsapp::before {
  content: "";
  position: absolute;
  top: 0;
  left: -75%;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.4);
  transform: skewX(-25deg);
  transition: 0.5s;
}

.btn-whatsapp:hover::before {
  left: 125%;
}

/* Animación flotante */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}

.btn-whatsapp {
  animation: float 2.5s ease-in-out infinite;
}

  </style>
</head>
<body>
<div class="typing">
  <a href="https://wa.me/50254379457" target="_blank" class="btn-contacto">
    🎀 Presiona aquí 💖
  </a>
</div>
</body>
</html>
